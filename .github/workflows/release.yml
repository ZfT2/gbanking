name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.profile }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      profile: windows
                      artifact_pattern: target/*-windows.zip
                    - os: ubuntu-latest
                      profile: linux
                      artifact_pattern: target/*-linux.tar.gz
                    - os: macos-latest
                      profile: mac
                      artifact_pattern: target/*-mac.tar.gz

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Configure Maven settings.xml
              shell: bash
              run: |
                mkdir -p ~/.m2
                cat > ~/.m2/settings.xml <<EOF
                  <settings>
                    <servers>
                      <server>
                        <id>github</id>
                        <username>ZfT2</username>
                        <password>${{ secrets.GH_PACKAGES_TOKEN }}</password>
                      </server>
                    </servers>
                  </settings>
                EOF

            - name: Debug platform
              run: echo "JavaFX Platform = ${{ matrix.profile }}"

            - name: Determine version
              shell: bash
              run: |
                  RAW_TAG=${GITHUB_REF_NAME#v}

                  if [[ "$RAW_TAG" == *"+"* ]]; then
                    BASE_VERSION=${RAW_TAG%%+*}
                    INCREMENT=${RAW_TAG##*+}
                  else
                    BASE_VERSION=$RAW_TAG
                    INCREMENT="none"
                  fi

                  # Version Guard
                  if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid version format: $BASE_VERSION"
                    exit 1
                  fi

                  IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

                  case $INCREMENT in
                    patch)
                      PATCH=$((PATCH + 1))
                      ;;
                    minor)
                      MINOR=$((MINOR + 1))
                      PATCH=0
                      ;;
                    major|Major)
                      MAJOR=$((MAJOR + 1))
                      MINOR=0
                      PATCH=0
                      ;;
                    none)
                      ;;
                    *)
                      echo "Invalid increment: $INCREMENT"
                      exit 1
                      ;;
                  esac

                  VERSION="$MAJOR.$MINOR.$PATCH"

                  echo "VERSION=$VERSION" >> $GITHUB_ENV
                  echo "Computed version: $VERSION"

            - name: Build distribution
              shell: bash
              run: |
                if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
                  xvfb-run mvn -B -Drevision="${VERSION}" -P${{ matrix.profile }} clean package
                else
                  mvn -B -Drevision="${VERSION}" -P${{ matrix.profile }} clean package
                fi

            - name: Upload distribution artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.profile }}-dist
                  path: ${{ matrix.artifact_pattern }}
                  if-no-files-found: error

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Show downloaded files
              run: find dist -type f

            - name: Determine version
              shell: bash
              run: |
                  RAW_TAG=${GITHUB_REF_NAME#v}

                  if [[ "$RAW_TAG" == *"+"* ]]; then
                    BASE_VERSION=${RAW_TAG%%+*}
                    INCREMENT=${RAW_TAG##*+}
                  else
                    BASE_VERSION=$RAW_TAG
                    INCREMENT="none"
                  fi

                  if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid version format: $BASE_VERSION"
                    exit 1
                  fi

                  IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

                  case $INCREMENT in
                    patch)
                      PATCH=$((PATCH + 1))
                      ;;
                    minor)
                      MINOR=$((MINOR + 1))
                      PATCH=0
                      ;;
                    major|Major)
                      MAJOR=$((MAJOR + 1))
                      MINOR=0
                      PATCH=0
                      ;;
                    none)
                      ;;
                    *)
                      echo "Invalid increment: $INCREMENT"
                      exit 1
                      ;;
                  esac

                  VERSION="$MAJOR.$MINOR.$PATCH"

                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Create release and upload assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="v${VERSION}"

                  gh release create "$TAG" \
                    dist/windows-dist/* \
                    dist/linux-dist/* \
                    dist/mac-dist/* \
                    --title "$TAG" \
                    --target "$GITHUB_SHA" \
                    --notes-file CHANGELOG.md

            - name: Set up Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: maven

            - name: Prepare next development version
              shell: bash
              run: |
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

                  NEXT_PATCH=$((PATCH + 1))
                  NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH-SNAPSHOT"

                  echo "Next development version: $NEXT_VERSION"

                  mvn -B org.codehaus.mojo:versions-maven-plugin:2.18.0:set-property \
                    -Dproperty=revision \
                    -DnewVersion="$NEXT_VERSION" \
                    -DgenerateBackupPoms=false

                  if git diff --quiet -- pom.xml; then
                    echo "No version changes"
                    exit 0
                  fi

                  git config user.name "github-actions"
                  git config user.email "actions@github.com"

                  git commit -am "chore: next development version $NEXT_VERSION"
                  git push origin HEAD:main
