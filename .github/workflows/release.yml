name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.profile }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      profile: windows
                      artifact_pattern: target/*-windows.zip
                    - os: ubuntu-latest
                      profile: linux
                      artifact_pattern: target/*-linux.tar.gz
                    - os: macos-latest
                      profile: mac
                      artifact_pattern: target/*-mac.tar.gz

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven

            - name: Build distribution
              run: mvn -B -P${{ matrix.profile }} clean package

            - name: Upload distribution artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.profile }}-dist
                  path: ${{ matrix.artifact_pattern }}
                  if-no-files-found: error

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Show downloaded files
              run: find dist -type f

            - name: Create release and upload assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"

                  gh release create "$TAG" \
                    dist/windows-dist/* \
                    dist/linux-dist/* \
                    dist/mac-dist/* \
                    --title "$TAG" \
                    --notes-file CHANGELOG.md
